type AdminPublication {
  id: ID!
  title: String!
  category: String!
  content: String!
  author: String!
  targetYear: String
  fileName: String
  filePath: String
  fileSizeBytes: Int
  createdAt: String!
}

type AdminGradeEntry {
  studentId: String!
  lastName: String!
  firstName: String!
  grade: Float!
}

type AdminGradeSubmission {
  id: ID!
  teacherName: String!
  teacherEmail: String
  targetYear: String!
  semester: String!
  subject: String!
  examType: String!
  title: String!
  summary: String
  entries: [AdminGradeEntry!]!
  status: String!
  validatedBy: String
  validatedAt: String
  publishedBy: String
  publishedAt: String
  publicationId: String
  createdAt: String!
  updatedAt: String!
}

extend type Query {
  adminPublications(
    category: String
    targetYear: String
    search: String
    offset: Int
    limit: Int
  ): [AdminPublication!]!

  adminPublication(id: ID!): AdminPublication

  adminGradeSubmissions(
    status: String
    targetYear: String
    offset: Int
    limit: Int
  ): [AdminGradeSubmission!]!

  adminGradeSubmission(id: ID!): AdminGradeSubmission
}
